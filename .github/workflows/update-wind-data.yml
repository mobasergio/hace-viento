name: Actualizar datos de viento

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Set up Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Fetch wind data
        run: npm run fetch-wind

      - name: Verify output
        run: |
          if [ ! -f public/wind.json ]; then
            echo "Error: public/wind.json not found"
            exit 1
          fi
          echo "public/wind.json size: $(wc -c < public/wind.json) bytes"

      - name: Commit and push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add public/wind.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update wind data [$(date +'%Y-%m-%d %H:%M')]"
            git push
          fi
